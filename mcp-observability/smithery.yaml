name: thinkneo-ai/smb-observability
displayName: MCP SMB Observability
description: >
  Datadog for AI Agents — trace every agent call with latency, cost, errors, and decision points. Session-based tracing with dashboard aggregation. 5 tools, TNC credits billing.
homepage: https://thinkneo.app
icon: https://thinkneo.app/favicon.ico
license: MIT
tags:
  - observability
  - tracing
  - monitoring
  - ai-agents
  - smb
  - mcp

start: uvicorn src.server:app --host 0.0.0.0 --port 8103

config:
  $schema: "http://json-schema.org/draft-07/schema#"
  type: object
  properties:
    apiKey:
      type: string
      title: ThinkNEO API Key (TNC Credits)
      description: >
        Required for all tools. Each call consumes TNC credits.
        Get your key and free trial credits at https://thinkneo.app/signup
      secret: true
