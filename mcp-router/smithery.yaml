name: thinkneo-ai/smb-router
displayName: MCP SMB Router
description: >
  AI Smart Router — route requests across 17+ models from 9 providers (Anthropic, OpenAI, Google, Meta, Mistral, DeepSeek, Alibaba, Cohere, xAI). Optimize for cost, quality, or latency. 4 tools, TNC credits billing.
homepage: https://thinkneo.app
icon: https://thinkneo.app/favicon.ico
license: MIT
tags:
  - smart-router
  - multi-provider
  - cost-optimization
  - model-routing
  - smb
  - mcp

start: uvicorn src.server:app --host 0.0.0.0 --port 8104

config:
  $schema: "http://json-schema.org/draft-07/schema#"
  type: object
  properties:
    apiKey:
      type: string
      title: ThinkNEO API Key (TNC Credits)
      description: >
        Required for all tools. Each call consumes TNC credits.
        Get your key and free trial credits at https://thinkneo.app/signup
      secret: true
