name: thinkneo-ai/smb-memory
displayName: MCP SMB Memory
description: >
  Persistent, searchable memory for AI agents — store, recall, and manage knowledge across sessions. Namespace isolation, tagging, and TTL support. 5 tools, TNC credits billing.
homepage: https://thinkneo.app
icon: https://thinkneo.app/favicon.ico
license: MIT
tags:
  - memory
  - persistence
  - knowledge-base
  - ai-agents
  - smb
  - mcp

start: uvicorn src.server:app --host 0.0.0.0 --port 8106

config:
  $schema: "http://json-schema.org/draft-07/schema#"
  type: object
  properties:
    apiKey:
      type: string
      title: ThinkNEO API Key (TNC Credits)
      description: >
        Required for all tools. Each call consumes TNC credits.
        Get your key and free trial credits at https://thinkneo.app/signup
      secret: true
