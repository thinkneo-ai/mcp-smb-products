name: thinkneo-ai/smb-trust-score
displayName: MCP SMB Trust Score
description: >
  AI Governance scoring (0-100) with badge system — evaluate your AI operations across 10 categories. Platinum/Gold/Silver/Bronze tiers with actionable recommendations. 4 tools, TNC credits billing.
homepage: https://thinkneo.app
icon: https://thinkneo.app/favicon.ico
license: MIT
tags:
  - trust-score
  - governance
  - compliance
  - badge
  - smb
  - mcp

start: uvicorn src.server:app --host 0.0.0.0 --port 8105

config:
  $schema: "http://json-schema.org/draft-07/schema#"
  type: object
  properties:
    apiKey:
      type: string
      title: ThinkNEO API Key (TNC Credits)
      description: >
        Required for all tools. Each call consumes TNC credits.
        Get your key and free trial credits at https://thinkneo.app/signup
      secret: true
