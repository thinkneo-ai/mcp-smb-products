# Nginx config for ThinkNEO MCP Products
# Add to /etc/nginx/sites-available/ on the DO droplet (161.35.12.205)
# Each product MCP gets its own path under mcp.thinkneo.app

# MCP SMB Developer Products
location /smb/guardrails/mcp {
    proxy_pass http://127.0.0.1:8101/mcp;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}
location /smb/guardrails/mcp/docs {
    proxy_pass http://127.0.0.1:8101/mcp/docs;
}

