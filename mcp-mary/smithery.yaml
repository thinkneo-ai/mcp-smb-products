name: thinkneo-ai/smb-mary
displayName: MCP SMB Mary
description: >
  AI Executive Assistant — manage tasks, contacts, calendar, documents, email drafts, and expenses through a single MCP interface. Bilingual (EN/PT-BR). 6 tools, TNC credits billing.
homepage: https://thinkneo.app
icon: https://thinkneo.app/favicon.ico
license: MIT
tags:
  - executive-assistant
  - task-management
  - email
  - scheduling
  - smb
  - mcp

start: uvicorn src.server:app --host 0.0.0.0 --port 8110

config:
  $schema: "http://json-schema.org/draft-07/schema#"
  type: object
  properties:
    apiKey:
      type: string
      title: ThinkNEO API Key (TNC Credits)
      description: >
        Required for all tools. Each call consumes TNC credits.
        Get your key and free trial credits at https://thinkneo.app/signup
      secret: true
