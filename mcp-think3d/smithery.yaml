name: thinkneo-ai/smb-think3d
displayName: MCP SMB Think3D
description: >
  Generate 3D models from text or images — GLB output with PBR textures, LOD variants, and format conversion (OBJ/FBX/STL/USDZ). 5 tools, TNC credits billing.
homepage: https://thinkneo.app
icon: https://thinkneo.app/favicon.ico
license: MIT
tags:
  - 3d-generation
  - text-to-3d
  - glb
  - mesh
  - smb
  - mcp

start: uvicorn src.server:app --host 0.0.0.0 --port 8111

config:
  $schema: "http://json-schema.org/draft-07/schema#"
  type: object
  properties:
    apiKey:
      type: string
      title: ThinkNEO API Key (TNC Credits)
      description: >
        Required for all tools. Each call consumes TNC credits.
        Get your key and free trial credits at https://thinkneo.app/signup
      secret: true
