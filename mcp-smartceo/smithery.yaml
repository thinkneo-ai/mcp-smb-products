name: thinkneo-ai/smb-smartceo
displayName: MCP SMB SmartCEO
description: >
  Live call AI briefing platform — real-time translation (EN/PT-BR/ES), intent detection, response suggestions, and post-call summaries with action items. 5 tools, TNC credits billing.
homepage: https://thinkneo.app
icon: https://thinkneo.app/favicon.ico
license: MIT
tags:
  - call-briefing
  - translation
  - intent-detection
  - voice-ai
  - smb
  - mcp

start: uvicorn src.server:app --host 0.0.0.0 --port 8109

config:
  $schema: "http://json-schema.org/draft-07/schema#"
  type: object
  properties:
    apiKey:
      type: string
      title: ThinkNEO API Key (TNC Credits)
      description: >
        Required for all tools. Each call consumes TNC credits.
        Get your key and free trial credits at https://thinkneo.app/signup
      secret: true
