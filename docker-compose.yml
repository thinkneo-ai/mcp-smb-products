  mcp-a2a-lite:
    <<: *common
    build:
      context: .
      args:
        PRODUCT_DIR: mcp-a2a-lite
        PORT: "8108"
    container_name: mcp-smb-a2a-lite
    ports:
      - "127.0.0.1:8108:8108"
    environment:
      PORT: "8108"
      PUBLIC_URL: "https://mcp.thinkneo.app/smb/a2a-lite"
