name: thinkneo-ai/smb-thinkcall
displayName: MCP SMB ThinkCall
description: >
  AI-powered voice calling — initiate calls, real-time Whisper transcription, sentiment analysis, and call analytics with speaker diarization. 5 tools, TNC credits billing.
homepage: https://thinkneo.app
icon: https://thinkneo.app/favicon.ico
license: MIT
tags:
  - voice-calling
  - transcription
  - whisper
  - call-analytics
  - smb
  - mcp

start: uvicorn src.server:app --host 0.0.0.0 --port 8112

config:
  $schema: "http://json-schema.org/draft-07/schema#"
  type: object
  properties:
    apiKey:
      type: string
      title: ThinkNEO API Key (TNC Credits)
      description: >
        Required for all tools. Each call consumes TNC credits.
        Get your key and free trial credits at https://thinkneo.app/signup
      secret: true
