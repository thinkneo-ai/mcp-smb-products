name: thinkneo-ai/smb-finops
displayName: MCP SMB FinOps
description: >
  AI cost management for SMBs — track spending across providers, set budgets with hard limits, forecast costs, and compare model pricing. 5 tools, TNC credits billing.
homepage: https://thinkneo.app
icon: https://thinkneo.app/favicon.ico
license: MIT
tags:
  - finops
  - cost-management
  - budget
  - ai-spending
  - smb
  - mcp

start: uvicorn src.server:app --host 0.0.0.0 --port 8102

config:
  $schema: "http://json-schema.org/draft-07/schema#"
  type: object
  properties:
    apiKey:
      type: string
      title: ThinkNEO API Key (TNC Credits)
      description: >
        Required for all tools. Each call consumes TNC credits.
        Get your key and free trial credits at https://thinkneo.app/signup
      secret: true
